<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickCart Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">QuickCart</span>
  <span class="text-white">Cart 🛒: <span id="cart-count">0</span></span>
</nav>

<div class="container mt-4">

  <!-- Filters -->
  <div class="row mb-3">
    <div class="col-md-3">
      <select id="categoryFilter" class="form-select">
        <option value="all">All Categories</option>
      </select>
    </div>

    <div class="col-md-3">
      <select id="sortPrice" class="form-select">
        <option value="">Sort by Price</option>
        <option value="low">Low to High</option>
        <option value="high">High to Low</option>
      </select>
    </div>

    <div class="col-md-6">
      <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
    </div>
  </div>

  <!-- Loader -->
  <div id="loader" class="text-center">Loading...</div>

  <!-- Error -->
  <div id="error" class="text-danger text-center"></div>

  <!-- Product Grid -->
  <div class="row" id="productContainer"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5 id="modalTitle"></h5>
      <img id="modalImage" class="img-fluid mb-2"/>
      <p id="modalDesc"></p>
      <p><strong>Price:</strong> $<span id="modalPrice"></span></p>
      <p><strong>Rating:</strong> <span id="modalRating"></span></p>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
